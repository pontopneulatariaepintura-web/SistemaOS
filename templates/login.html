<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema OS</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #111827;
            background-image: linear-gradient(rgba(17,24,39,.78), rgba(17,24,39,.78)), url("{{ url_for('static', filename='logo-ponto-pneu.png') }}");
            background-repeat: no-repeat;
            background-position: center;
            background-size: min(820px, 86vw);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box { width: 100%; max-width: 380px; background: rgba(255,255,255,.96); border-radius: 12px; padding: 34px; box-shadow: 0 18px 45px rgba(0,0,0,.28); text-align: center; }
        .login-logo { width: 130px; height: 130px; border-radius: 50%; object-fit: contain; margin: 0 auto 16px; display: block; }
        h1 { margin: 0 0 8px; color: #111827; font-size: 26px; }
        p { margin: 0 0 22px; color: #4b5563; }
        label { display: block; font-weight: bold; margin: 12px 0 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 7px; font-size: 15px; }
        button { width: 100%; margin-top: 18px; padding: 12px; border: 0; border-radius: 7px; background: #2563eb; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .flash { padding: 11px; border-radius: 7px; margin-bottom: 14px; font-weight: bold; }
        .flash-success { background: #dcfce7; color: #166534; }
        .flash-danger { background: #fee2e2; color: #991b1b; }
        .flash-warning { background: #fef3c7; color: #92400e; }
        .flash-info { background: #dbeafe; color: #1e40af; }
        .footer { margin-top: 16px; color: #6b7280; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <img class="login-logo" src="{{ url_for('static', filename='logo-ponto-pneu.png') }}" alt="Ponto Pneu Lataria e Pintura">
        <h1>Sistema OS</h1>
        <p>Acesse com seu usu&aacute;rio e senha.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <label for="username">Usu&aacute;rio</label>
            <input id="username" type="text" name="username" autocomplete="username" required autofocus>
            <label for="password">Senha</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required>
            <button type="submit">Entrar</button>
        </form>
        <div class="footer">Ponto Pneu Lataria & Pintura</div>
    </div>
</body>
</html>
