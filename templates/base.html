<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema OS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #cfe8ff, #f5fbff);
            min-height: 100vh;
        }

        .navbar-custom {
            background: #0d6efd;
        }

        .navbar-custom a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .card {
            border-radius: 12px;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
        }

        .Aberta { background: #ffc107; }
        .Em.andamento { background: #0dcaf0; }
        .Finalizada { background: #198754; }

    </style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-custom px-3 py-2">
    <a href="/">🏁 Sistema OS - Oficina</a>

    <div>
        <a href="/" class="me-3">Home</a>
        <a href="/nova_os" class="me-3">Nova OS</a>
        <a href="/listar_os">OS</a>
    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
