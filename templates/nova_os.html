{% extends "base.html" %}
{% block title %}Nova OS{% endblock %}
{% block content %}
<div class="panel">
    <h1>Nova ordem de servi&ccedil;o</h1>
    <form method="POST" class="form-grid" enctype="multipart/form-data">
        <div><label>N&uacute;mero da OS *</label><input type="text" name="numero_os" value="{{ form_data.get('numero_os', '') }}" required></div>
        <div><label>Cliente *</label><input type="text" name="cliente" value="{{ form_data.get('cliente', '') }}" required></div>
        <div><label>Carro/modelo</label><input type="text" name="carro_modelo" value="{{ form_data.get('carro_modelo', '') }}"></div>
        <div><label>Placa *</label><input type="text" name="placa" value="{{ form_data.get('placa', '') }}" required></div>
        <div>
            <label>Seguradora *</label>
            <select name="seguradora" required>
                <option value="">Selecione a seguradora</option>
                {% for seguradora in seguradoras %}
                <option value="{{ seguradora }}" {% if form_data.get('seguradora') == seguradora %}selected{% endif %}>{{ seguradora }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Ve&iacute;culo de terceiro?</label>
            <select name="veiculo_terceiro">
                <option value="nao" {% if form_data.get('veiculo_terceiro') != 'sim' %}selected{% endif %}>N&atilde;o</option>
                <option value="sim" {% if form_data.get('veiculo_terceiro') == 'sim' %}selected{% endif %}>Sim</option>
            </select>
        </div>
        <div class="full">
            <label>Tipo de reparo *</label>
            <select name="tipo_reparo" required>
                <option value="">Selecione o que ser&aacute; feito no ve&iacute;culo</option>
                {% for tipo in tipos_reparo %}
                <option value="{{ tipo }}" {% if form_data.get('tipo_reparo') == tipo %}selected{% endif %}>{{ tipo }}</option>
                {% endfor %}
            </select>
        </div>
        <div><label>Entrada</label><input type="date" name="data_entrada" value="{{ form_data.get('data_entrada', '') }}"></div>
        <div><label>Vistoria</label><input type="date" name="data_vistoria" value="{{ form_data.get('data_vistoria', '') }}"></div>
        <div><label>Libera&ccedil;&atilde;o da vistoria</label><input type="date" name="data_liberacao_vistoria" value="{{ form_data.get('data_liberacao_vistoria', '') }}"></div>
        <div><label>In&iacute;cio do reparo</label><input type="date" name="data_inicio_reparo" value="{{ form_data.get('data_inicio_reparo', '') }}"></div>
        <div><label>Previs&atilde;o de entrega</label><input type="date" name="previsao_entrega" value="{{ form_data.get('previsao_entrega', '') }}"></div>
        <div><label>Pagamento</label><input type="date" name="data_pagamento" value="{{ form_data.get('data_pagamento', '') }}"></div>
        <div><label>Valor de pe&ccedil;as *</label><input type="number" step="0.01" min="0" name="valor_pecas" value="{{ form_data.get('valor_pecas', '') }}" required></div>
        <div><label>Valor m&atilde;o de obra *</label><input type="number" step="0.01" min="0" name="valor_mao_obra" value="{{ form_data.get('valor_mao_obra', '') }}" required></div>
        <div><label>Custo de pe&ccedil;as</label><input type="number" step="0.01" min="0" name="custo_pecas" value="{{ form_data.get('custo_pecas', '') }}"></div>
        <div><label>Or&ccedil;amento</label><input type="number" step="0.01" min="0" name="orcamento" value="{{ form_data.get('orcamento', '') }}"></div>
        <div><label>Franquia</label><input type="number" step="0.01" min="0" name="franquia" value="{{ form_data.get('franquia', '') }}"></div>
        <div><label>Total a receber</label><input type="number" step="0.01" min="0" name="total_receber" value="{{ form_data.get('total_receber', '') }}"></div>
        <div><label>Valor negociado</label><input type="number" step="0.01" min="0" name="valor_negociado" value="{{ form_data.get('valor_negociado', '') }}"></div>
        <div><label>Contrapartida financeira</label><input type="number" step="0.01" min="0" name="contrapartida_financeira" value="{{ form_data.get('contrapartida_financeira', '') }}"></div>
        <div><label>Faturado para MaxPar</label><input type="number" step="0.01" min="0" name="faturado_maxpar" value="{{ form_data.get('faturado_maxpar', '') }}"></div>
        <div class="full"><label>Fotos do ve&iacute;culo</label><input type="file" name="fotos" accept="image/*" multiple></div>
        <div class="full actions"><button class="btn btn-success" type="submit">Salvar OS</button><a class="btn btn-muted" href="{{ url_for('listar_os') }}">Voltar</a></div>
    </form>
</div>
{% endblock %}
