{% extends "base.html" %}
{% block title %}{{ 'Editar para-brisa' if item else 'Novo para-brisa' }}{% endblock %}
{% block content %}
<div class="panel">
    <h1>{{ 'Editar para-brisa' if item else 'Novo para-brisa' }}</h1>
    <form method="POST" class="form-grid">
        <div><label>Ve&iacute;culo</label><input type="text" name="veiculo" value="{{ item.veiculo if item else '' }}" required></div>
        <div><label>Modelo/vers&atilde;o</label><input type="text" name="modelo" value="{{ item.modelo if item else '' }}"></div>
        <div><label>Ano inicial</label><input type="number" min="1900" max="2100" name="ano_inicial" value="{{ item.ano_inicial if item and item.ano_inicial else '' }}"></div>
        <div><label>Ano final</label><input type="number" min="1900" max="2100" name="ano_final" value="{{ item.ano_final if item and item.ano_final else '' }}"></div>
        <div>
            <label>Lado/tipo</label>
            <select name="lado">
                {% set lado_atual = item.lado if item else 'Dianteiro' %}
                <option value="Dianteiro" {% if lado_atual == 'Dianteiro' %}selected{% endif %}>Dianteiro</option>
                <option value="Traseiro" {% if lado_atual == 'Traseiro' %}selected{% endif %}>Traseiro</option>
                <option value="Lateral esquerdo" {% if lado_atual == 'Lateral esquerdo' %}selected{% endif %}>Lateral esquerdo</option>
                <option value="Lateral direito" {% if lado_atual == 'Lateral direito' %}selected{% endif %}>Lateral direito</option>
            </select>
        </div>
        <div><label>C&oacute;digo</label><input type="text" name="codigo" value="{{ item.codigo if item else '' }}"></div>
        <div><label>Fornecedor</label><input type="text" name="fornecedor" value="{{ item.fornecedor if item else '' }}"></div>
        <div><label>Localiza&ccedil;&atilde;o</label><input type="text" name="localizacao" value="{{ item.localizacao if item else '' }}"></div>
        <div><label>Quantidade</label><input type="number" min="0" name="quantidade" value="{{ item.quantidade if item else 0 }}"></div>
        <div><label>Estoque m&iacute;nimo</label><input type="number" min="0" name="estoque_minimo" value="{{ item.estoque_minimo if item else 0 }}"></div>
        <div><label>Valor unit&aacute;rio</label><input type="number" min="0" step="0.01" name="valor_unitario" value="{{ item.valor_unitario if item else 0 }}"></div>
        <div class="full actions"><button class="btn btn-success" type="submit">Salvar</button><a class="btn btn-muted" href="{{ url_for('para_brisas') }}">Voltar</a></div>
    </form>
</div>
{% endblock %}
