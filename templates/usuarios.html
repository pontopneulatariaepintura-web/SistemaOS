<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Usuários</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #111;
            color: #fff;
        }

        .btn {
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            font-size: 12px;
        }

        .novo {
            background: #28a745;
            display: inline-block;
            margin-bottom: 15px;
        }

        .delete {
            background: #dc3545;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Usuários</h2>

    <a href="{{ url_for('novo_usuario') }}" class="btn novo">+ Novo Usuário</a>

    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Usuário</th>
            <th>Ações</th>
        </tr>

        {% for u in usuarios %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.nome }}</td>
            <td>{{ u.usuario }}</td>
            <td>
                <a href="/deletar_usuario/{{ u.id }}" class="btn delete">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
